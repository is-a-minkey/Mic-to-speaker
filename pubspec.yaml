name: megaphone
description: Real-time audio passthrough megaphone application.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Audio engine — PCM-16 streaming with AEC
  flutter_sound: 9.15.11

  # Permissions
  permission_handler: 11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
